
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>NIX - Endless Glitch Run</title>
<style>
  html,body{margin:0;padding:0;width:100%;height:100%;background:#0d0d16;overflow:hidden;font-family:'Courier New',monospace;}
  #wrap{position:fixed;inset:0;width:100vw;height:100vh;overflow:hidden;}
  canvas{width:100vw;height:100vh;display:block;image-rendering:pixelated;border:0;box-shadow:none;touch-action:none;cursor:pointer;}
  #hud{position:absolute;top:16px;left:16px;color:#fff;pointer-events:none;font-size:15px;
       background:#1a1428;border:3px solid #4a3a5a;box-shadow:0 0 0 3px #0d0a14, 4px 4px 0 rgba(0,0,0,0.4);
       padding:10px 16px;border-radius:2px;display:flex;gap:22px;align-items:center;}
  .hud-item{display:flex;align-items:center;gap:6px;text-shadow:1px 1px 0 #000;white-space:nowrap;}
  .hud-bar{width:46px;height:8px;background:#0d0a14;border:1px solid #4a3a5a;position:relative;}
  .hud-bar-fill{position:absolute;top:0;left:0;height:100%;background:linear-gradient(#7ed957,#4a9e3a);}
  #msg{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#fff;
       font-size:26px;text-shadow:3px 3px 0 #000;display:none;text-align:center;line-height:1.7;}
  #controls{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);color:#aaa;
       font-size:12px;text-align:center;text-shadow:1px 1px 0 #000;}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game" width="960" height="540"></canvas>
  <div id="hud">
    <div class="hud-item">📏 <span id="dist">0</span>m</div>
    <div class="hud-item">🏆 <span id="best">0</span>m</div>
    <div class="hud-item">🪙 <span id="coins">0</span></div>
    <div class="hud-item">❤️ <span id="lives">0</span></div>
    <div class="hud-item">⚡<div class="hud-bar"><div class="hud-bar-fill" id="dashBar" style="width:100%"></div></div></div>
    <div class="hud-item">⏪<div class="hud-bar"><div class="hud-bar-fill" id="rewBar" style="width:100%;background:linear-gradient(#7ec8f5,#3a8cc9)"></div></div></div>
  </div>
  <div id="msg"></div>
  <div id="controls">🖱️ Left Click: Jump/Start/Retry &nbsp;|&nbsp; 🖱️ Right Click: Dash &nbsp;|&nbsp; 🖱️ Wheel or Middle Click: Glitch Rewind &nbsp;|&nbsp; Keyboard also works</div>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;

const W = canvas.width, H = canvas.height;
const GROUND_Y = 480;
const GRAVITY = 0.55;
const FALL_GRAVITY_MULT = 1.35;
const JUMP_FORCE = -11.7;
const JUMP_CUT_MULT = 0.45;
const DASH_DURATION = 12;
const DASH_BOOST = 9;
const DASH_COOLDOWN = 70;
const REWIND_FRAMES = 120;
const REWIND_COOLDOWN = 280;
const COYOTE_TIME = 7;
const JUMP_BUFFER = 8;
const BASE_SPEED = 5.2;
const MAX_SPEED = 14.5;
const CAM_OFFSET = W*0.28;

// ---------- PIXEL ART SPRITES ----------
const PALETTE = { 'D':'#4a2a1a','O':'#e07a2a','L':'#f5a354','W':'#faf0e1','B':'#1a1412','P':'#e896a0','S':'#3a78a8' };
const ENEMY_PALETTE = { 'D':'#4a2a1a','P':'#7a4aa8','W':'#ebe1f5','B':'#1a1412' };

const FOX_IDLE = ['....................','.........DD........','........DLOD.......','.......DPOOOD......','......DOOOOOOD.....','DD...DOOOOOOOOD....','DLD.DOOOOOOOOOOD...','DOD.DOOOOOOOOOOOD..','DLDDOOOOOOOWWWOOD..','.DDOOOOOOOOWBWOOD..','..DOOOOOOOOWWOOOD..','..DOOOOOOOOOOOOD...','...DOOOOOOOOOOD....','....DSSSSSSSD......','...DOSSSSSSSOD.....','...DOOO...OOOD.....','...DOO.....OOD.....','....DD.....DD......'];
const FOX_RUN1 = ['....................','.........DD........','........DLOD.......','.......DPOOOD......','......DOOOOOOD.....','DD...DOOOOOOOOD....','DLD.DOOOOOOOOOOD...','DOD.DOOOOOOOOOOOD..','DLDDOOOOOOOWWWOOD..','.DDOOOOOOOOWBWOOD..','..DOOOOOOOOWWOOOD..','..DOOOOOOOOOOOOD...','...DOOOOOOOOOOD....','....DSSSSSSSD......','...DOSSSSSSSOD.....','...DOOO..OOOD......','..DOO.......OOD....','.DD...........DD...'];
const FOX_RUN2 = ['....................','.........DD........','........DLOD.......','.......DPOOOD......','......DOOOOOOD.....','DD...DOOOOOOOOD....','DLD.DOOOOOOOOOOD...','DOD.DOOOOOOOOOOOD..','DLDDOOOOOOOWWWOOD..','.DDOOOOOOOOWBWOOD..','..DOOOOOOOOWWOOOD..','..DOOOOOOOOOOOOD...','...DOOOOOOOOOOD....','....DSSSSSSSD......','...DOSSSSSSSOD.....','...DOOO..OOOD......','....OOO...OO.......','...DD......DD......'];
const FOX_JUMP = ['....................','.........DD........','........DLOD.......','.......DPOOOD......','......DOOOOOOD.....','DD...DOOOOOOOOD....','DLD.DOOOOOOOOOOD...','DOD.DOOOOOOOOOOOD..','DLDDOOOOOOOWWWOOD..','.DDOOOOOOOOWBWOOD..','..DOOOOOOOOWWOOOD..','..DOOOOOOOOOOOOD...','...DOOOOOOOOOOD....','....DSSSSSSSD......','...DOSSSSSSSOD.....','...DOOOOOOOOOD.....','...DOO.....OOD.....','....DD.....DD......'];
const ENEMY_SPRITE = ['................','......DD........','.....DPPD.DD....','....DPPPPD.D....','...DPPPPPPPD....','..DPPWBPWPPD....','.DPPPWWWPPPPD...','.DPPPPPPPPPPD...','.DPPPPPPPPPPD...','..DPPPPPPPPD....','...DPD...DPD....','...DD.....DD....','................'];

const PIX = 2.6, ENEMY_PIX = 2.6;

function drawSpriteGrid(grid, palette, pix, flip){
  const w = grid[0].length, h = grid.length;
  const startX = -(w*pix)/2, startY = -(h*pix);
  for(let row=0; row<h; row++){
    const line = grid[row];
    for(let col=0; col<w; col++){
      const ch = line[col];
      if(ch==='.' || !palette[ch]) continue;
      ctx.fillStyle = palette[ch];
      const drawCol = flip ? (w-1-col) : col;
      ctx.fillRect(Math.round(startX+drawCol*pix), Math.round(startY+row*pix), Math.ceil(pix), Math.ceil(pix));
    }
  }
}

function hashRand(seed){ const x = Math.sin(seed*127.1)*43758.5453; return x - Math.floor(x); }

// ---------- DAY / NIGHT CYCLE ----------
// every 1000m the world flips to a dim moonlit night, then back to sunny morning 1000m later
function lerpColor(hexA, hexB, t){
  const a = parseInt(hexA.slice(1),16), b = parseInt(hexB.slice(1),16);
  const ar=(a>>16)&255, ag=(a>>8)&255, ab=a&255;
  const br=(b>>16)&255, bg=(b>>8)&255, bb=b&255;
  const r = Math.round(ar+(br-ar)*t), g = Math.round(ag+(bg-ag)*t), bl = Math.round(ab+(bb-ab)*t);
  return `rgb(${r},${g},${bl})`;
}
function getNightFactor(distMeters){
  const cyclePos = ((distMeters % 2000)+2000)%2000; // 0-999 day, 1000-1999 night
  const trans = 120; // smooth blend window at each boundary
  if(cyclePos < 1000-trans) return 0;
  if(cyclePos < 1000) return (cyclePos-(1000-trans))/trans;
  if(cyclePos < 2000-trans) return 1;
  return 1-(cyclePos-(2000-trans))/trans;
}

// ---------- ENDLESS TERRAIN ----------
let groundSegments = [];
let obstacles = [];   // cactus spikes: instant death unless dashing
let flyingEnemies = []; // stompable
let coins = [];
let hearts = []; // rare pickup: grants an extra life
let terrainCursor = 0;
let terrainSeed = Math.random()*1000;
let lastHeartX = -99999; // keeps hearts genuinely rare + spaced out

function resetWorld(){
  groundSegments = []; obstacles = []; flyingEnemies = []; coins = []; hearts = [];
  terrainCursor = 0; lastHeartX = -99999;
  // safe starting platform
  groundSegments.push({x:0, y:GROUND_Y, w:500, h:120});
  terrainCursor = 500;
}

function placeContentInSegment(x1, x2, groundY){
  const segW = x2-x1;
  if(segW < 90) return;
  // progressive difficulty: obstacle density itself rises with distance travelled,
  // not just the gap sizes between platforms
  const diff = Math.min(1, x1/12000);
  const spikeThresh = 0.22 + diff*0.18;          // 0.22 -> 0.40
  const enemyThresh = spikeThresh + 0.16 + diff*0.10; // window widens too
  const r = hashRand(x1*0.017+terrainSeed);
  if(r < spikeThresh){
    // cactus obstacle
    const sx = x1 + segW*0.5;
    obstacles.push({x:sx, y:groundY-32, w:24, h:32});
    // at higher difficulty, occasionally place a twin cactus right after for a tighter dodge
    if(diff > 0.45 && hashRand(x1*1.7+terrainSeed) > 0.6 && segW > 160){
      obstacles.push({x:sx+55, y:groundY-32, w:24, h:32});
    }
  } else if(r < enemyThresh){
    // flying enemy
    const ex = x1 + segW*0.5;
    flyingEnemies.push({x:ex, y:groundY-90-hashRand(x1)*40, w:28, h:32, vx:0, alive:true, animTimer:hashRand(x1)*100, baseY:groundY-90-hashRand(x1)*40});
  }
  // coin arc (independent chance)
  if(hashRand(x1*0.031+terrainSeed+5) > 0.4){
    const coinCount3 = 3 + Math.floor(hashRand(x1*0.7)*3);
    const startCx = x1 + segW*0.25;
    for(let i=0;i<coinCount3;i++){
      coins.push({x:startCx + i*34, y: groundY-70-Math.sin(i/(coinCount3-1||1)*Math.PI)*40, taken:false});
    }
  }
  // rare heart pickup: genuinely uncommon, and spaced well apart from the last one
  if(x1 - lastHeartX > 1400 && hashRand(x1*0.043+terrainSeed+9) > 0.965){
    const hx = x1 + segW*0.5;
    hearts.push({x:hx, y:groundY-100, taken:false, bobSeed:hashRand(x1)*100});
    lastHeartX = x1;
  }
}

function ensureTerrain(playerX){
  while(terrainCursor < playerX + W*1.6){
    const segLen = 240 + hashRand(terrainCursor*0.011+terrainSeed)*280;
    groundSegments.push({x:terrainCursor, y:GROUND_Y, w:segLen, h:120});
    placeContentInSegment(terrainCursor+30, terrainCursor+segLen-30, GROUND_Y);
    terrainCursor += segLen;
    const noGap = hashRand(terrainCursor*0.023+terrainSeed) < 0.3;
    if(!noGap){
      const difficultyT = Math.min(1, frame/4200);
      const gap = 95 + hashRand(terrainCursor*0.019+terrainSeed)*(90+difficultyT*70);
      terrainCursor += gap;
    }
  }
  // prune far-behind entities.
  // Must stay far enough back that a Glitch Rewind (up to REWIND_FRAMES frames,
  // at up to MAX_SPEED px/frame) never rewinds the player onto ground that's
  // already been discarded.
  const rewindSafeDist = REWIND_FRAMES*MAX_SPEED + 200;
  const pruneX = playerX - Math.max(W*1.3, rewindSafeDist);
  groundSegments = groundSegments.filter(s=>s.x+s.w > pruneX);
  obstacles = obstacles.filter(o=>o.x+o.w > pruneX);
  flyingEnemies = flyingEnemies.filter(e=>e.x+e.w > pruneX);
  coins = coins.filter(c=>c.x > pruneX);
  hearts = hearts.filter(h=>h.x > pruneX);
}

// ---------- PLAYER ----------
let player = {
  x:60, y:400, w:28, h:36,
  vx:0, vy:0,
  onGround:false,
  jumpsUsed:0, maxJumps:2,
  facing:1, touchingWallDir:0,
  isDashing:false, dashTimer:0, dashCooldown:0,
  rewindCooldown:0, history:[],
  coyote:0, jumpBuffer:0, jumpHeld:false,
  scaleX:1, scaleY:1,
  animTimer:0, animFrame:'idle',
  dead:false,
  extraLives:0, invuln:0,
};

const keys = {};

// ---------- MOUSE CONTROLS ----------
// Left click: jump / start / retry
// Right click: Dash
// Mouse wheel or middle click: Glitch Rewind
function mouseTapKey(code, ms=80){
  keys[code] = true;
  setTimeout(()=>{ keys[code] = false; }, ms);
}
canvas.addEventListener('mousedown', e=>{
  ensureAudio();
  canvas.focus?.();
  if(e.button === 0){
    // Left click = jump. Also starts/restarts because the game already uses Space for that.
    keys['Space'] = true;
  } else if(e.button === 2){
    keys['ShiftLeft'] = true;
  } else if(e.button === 1){
    mouseTapKey('KeyR', 90);
  }
});
canvas.addEventListener('mouseup', e=>{
  if(e.button === 0) keys['Space'] = false;
  if(e.button === 2) keys['ShiftLeft'] = false;
});
canvas.addEventListener('mouseleave', ()=>{
  keys['Space'] = false;
  keys['ShiftLeft'] = false;
});
canvas.addEventListener('contextmenu', e=>e.preventDefault());

// Touch support: tap = jump/start/retry
canvas.addEventListener('touchstart', e=>{
  e.preventDefault(); ensureAudio();
  if(gameState === 'title'){ resetRun(); gameState='playing'; return; }
  if(gameState === 'dead'){ gameState='playing'; resetRun(); return; }
  keys['Space'] = true;
}, {passive:false});
canvas.addEventListener('touchend', e=>{ e.preventDefault(); keys['Space'] = false; }, {passive:false});
canvas.addEventListener('wheel', e=>{
  e.preventDefault();
  ensureAudio();
  mouseTapKey('KeyR', 90);
}, {passive:false});
window.addEventListener('keydown', e=>{
  keys[e.code]=true;
  if(['Space','ArrowUp','ArrowLeft','ArrowRight','ShiftLeft','ShiftRight','KeyR'].includes(e.code)) e.preventDefault();
});
window.addEventListener('keyup', e=>keys[e.code]=false);

let camX = 0, camXTarget = 0;
let shakeTime = 0, shakeMag = 0;
let coinCount = 0, frame = 0;
let particles = [];
let gameState = 'title'; // 'title' | 'playing' | 'dead'
let gameSpeed = BASE_SPEED;
let bestDistance = 0;
try{
  bestDistance = parseInt(localStorage.getItem('nix_best_distance')||'0', 10) || 0;
  document.getElementById('best').textContent = bestDistance;
}catch(e){ /* localStorage unavailable, fall back to session-only best */ }

// ---------- AUDIO ----------
let audioCtx = null;
function ensureAudio(){ if(!audioCtx){ try{ audioCtx = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } }
function beep(freq, dur, type='square', vol=0.14, sweepTo=null, delay=0){
  if(!audioCtx) return;
  const t0 = audioCtx.currentTime + delay;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, t0);
  if(sweepTo) osc.frequency.exponentialRampToValueAtTime(sweepTo, t0+dur);
  gain.gain.setValueAtTime(vol, t0);
  gain.gain.exponentialRampToValueAtTime(0.001, t0+dur);
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.start(t0); osc.stop(t0+dur+0.02);
}
const SFX = {
  jump: ()=>beep(520,0.09,'square',0.11),
  doubleJump: ()=>beep(680,0.09,'square',0.11),
  dash: ()=>beep(280,0.12,'sawtooth',0.09,900),
  coin: ()=>{ beep(880,0.07,'square',0.11); beep(1320,0.09,'square',0.11,null,0.06); },
  heart: ()=>{ beep(660,0.1,'sine',0.13); beep(990,0.14,'sine',0.13,null,0.08); beep(1320,0.16,'sine',0.12,null,0.16); },
  land: (vol)=>beep(90,0.08,'sine',Math.min(0.18,vol)),
  rewind: ()=>beep(700,0.25,'sine',0.1,150),
  enemyDefeat: ()=>beep(220,0.15,'square',0.13,50),
  death: ()=>beep(320,0.3,'sawtooth',0.13,70),
};

function rectsOverlap(a,b){ return a.x<b.x+b.w && a.x+a.w>b.x && a.y<b.y+b.h && a.y+a.h>b.y; }
function groundYUnder(entity){
  const cx = entity.x + entity.w/2;
  let best = entity.y + entity.h + 400;
  for(const seg of groundSegments){
    if(cx >= seg.x && cx <= seg.x+seg.w && seg.y >= entity.y){ if(seg.y < best) best = seg.y; }
  }
  return Math.min(best, entity.y + entity.h + 300);
}
function spawnParticles(x,y,count,color,opts={}){
  for(let i=0;i<count;i++){
    particles.push({x,y,vx:(Math.random()-0.5)*(opts.spreadX ?? 3),
      vy:(opts.up ? -Math.random()*3-1 : (Math.random()-0.5)*2),
      life:opts.life ?? 20, maxLife:opts.life ?? 20, color, size:opts.size ?? (Math.random()*3+2)});
  }
}
function updateParticles(){
  for(const p of particles){ p.x+=p.vx; p.y+=p.vy; p.vy+=0.15; p.life--; }
  particles = particles.filter(p=>p.life>0);
}
function drawParticles(){
  for(const p of particles){
    ctx.globalAlpha = Math.max(0, p.life/p.maxLife);
    ctx.fillStyle = p.color;
    ctx.fillRect(Math.round(p.x-camX), Math.round(p.y), p.size, p.size);
  }
  ctx.globalAlpha = 1;
}

function resolveGroundCollisions(p){
  p.onGround = false;
  for(const seg of groundSegments){
    if(!rectsOverlap(p, seg)) continue;
    const prevY = p.y - p.vy;
    const wasAbove = (prevY + p.h <= seg.y);
    if(wasAbove && p.vy >= 0){
      const impact = p.vy;
      p.y = seg.y - p.h; p.vy = 0;
      if(!p.onGround && impact > 9){
        spawnParticles(p.x+p.w/2, p.y+p.h, Math.min(10, Math.floor(impact)), '#c9b896', {spreadX:5, life:16, size:3});
        shakeTime = 6; shakeMag = Math.min(4, impact*0.3);
        p.scaleX = 1.3; p.scaleY = 0.7;
        SFX.land(impact*0.015);
      }
      p.onGround = true; p.jumpsUsed = 0; p.coyote = COYOTE_TIME;
    } else if(p.vy < 0 && (prevY >= seg.y+seg.h)){
      p.y = seg.y + seg.h; p.vy = 0;
    }
  }
}

function resetRun(){
  resetWorld();
  player.x = 60; player.y = 400; player.vx=0; player.vy=0;
  player.onGround=false; player.jumpsUsed=0; player.isDashing=false;
  player.dashTimer=0; player.dashCooldown=0; player.rewindCooldown=0; player.history=[];
  player.coyote=0; player.jumpBuffer=0; player.dead=false;
  player.scaleX=1; player.scaleY=1; player.animFrame='idle';
  player.extraLives=0; player.invuln=0;
  coinCount = 0; frame = 0; gameSpeed = BASE_SPEED; camX = 0; camXTarget = 0;
  particles = [];
  document.getElementById('coins').textContent = 0;
  document.getElementById('lives').textContent = 0;
  document.getElementById('msg').style.display='none';
  terrainSeed = Math.random()*1000;
}

function update(){
  frame++;
  if(gameState === 'title'){
    if(keys['Space']){ ensureAudio(); resetRun(); gameState = 'playing'; }
    return;
  }
  if(gameState === 'dead'){
    if(keys['Space']){ gameState='playing'; resetRun(); }
    return;
  }

  ensureTerrain(player.x);

  gameSpeed = Math.min(MAX_SPEED, BASE_SPEED + frame*0.0007);

  player.history.push({x:player.x, y:player.y});
  if(player.history.length > REWIND_FRAMES) player.history.shift();

  if(player.dashCooldown>0) player.dashCooldown--;
  if(player.rewindCooldown>0) player.rewindCooldown--;
  if(player.coyote>0 && !player.onGround) player.coyote--;
  if(player.jumpBuffer>0) player.jumpBuffer--;

  player.scaleX += (1-player.scaleX)*0.25;
  player.scaleY += (1-player.scaleY)*0.25;

  if(keys['KeyR'] && player.rewindCooldown<=0 && player.history.length>10){
    const target = player.history[0];
    player.x = target.x; player.y = target.y; player.vy=0;
    player.rewindCooldown = REWIND_COOLDOWN; player.history = [];
    glitchFlash = 12;
    spawnParticles(player.x+player.w/2, player.y+player.h/2, 14, '#8ef0ff', {spreadX:8, life:24, size:3});
    SFX.rewind();
  }

  const jumpPressed = keys['Space'] || keys['ArrowUp'] || keys['KeyW'];
  const dashPressed = keys['ShiftLeft'] || keys['ShiftRight'];

  if(jumpPressed && !player.jumpHeld) player.jumpBuffer = JUMP_BUFFER;
  player.jumpHeld = jumpPressed;

  // auto-run forward
  player.vx = gameSpeed + (player.isDashing ? DASH_BOOST : 0);

  const canGroundJump = (player.onGround || player.coyote>0) && player.jumpsUsed===0;
  const canAirJump = !player.onGround && player.jumpsUsed < player.maxJumps;

  if(player.jumpBuffer>0 && (canGroundJump || canAirJump)){
    player.vy = JUMP_FORCE;
    player.jumpsUsed++; player.coyote = 0;
    if(player.jumpsUsed>1) SFX.doubleJump(); else SFX.jump();
    player.jumpBuffer = 0;
    player.scaleX = 0.75; player.scaleY = 1.3;
    spawnParticles(player.x+player.w/2, player.y+player.h, 6, '#cfd8dc', {spreadX:3, life:12, size:2, up:true});
  }
  if(!jumpPressed && player.vy < -2) player.vy *= JUMP_CUT_MULT;

  if(dashPressed && player.dashCooldown<=0 && !player.isDashing){
    player.isDashing = true; player.dashTimer = DASH_DURATION;
    player.dashCooldown = DASH_COOLDOWN;
    SFX.dash();
  }
  if(player.isDashing){
    player.dashTimer--;
    spawnParticles(player.x, player.y+player.h/2, 2, '#ffffff', {spreadX:1, life:14, size:4});
    if(player.dashTimer<=0) player.isDashing = false;
  }
  const g = player.vy > 0 ? GRAVITY*FALL_GRAVITY_MULT : GRAVITY;
  player.vy += g; player.vy = Math.min(player.vy, 18);

  player.x += player.vx;
  player.y += player.vy;
  resolveGroundCollisions(player);

  if(player.y > H+250){ triggerDeath(); }

  camXTarget = player.x - CAM_OFFSET;
  camX += (camXTarget - camX) * 0.15;

  if(!player.onGround){ player.animFrame = 'jump'; }
  else { player.animTimer++; player.animFrame = Math.floor(player.animTimer/6)%2===0 ? 'run1' : 'run2'; }

  // obstacles (cactus spikes) - deadly unless dashing
  if(!player.isDashing){
    for(const o of obstacles){
      if(rectsOverlap(player, o)){ triggerDeath(); break; }
    }
  }

  // flying enemies - stomp or die (dash = safe pass-through)
  for(const e of flyingEnemies){
    if(!e.alive) continue;
    e.animTimer++;
    e.y = e.baseY + Math.sin(e.animTimer*0.06)*10;
    if(rectsOverlap(player, e)){
      if(player.isDashing){ continue; }
      if(player.vy > 2 && player.y + player.h - e.y < 18){
        e.alive = false; player.vy = -8;
        spawnParticles(e.x+e.w/2, e.y+e.h/2, 14, '#7a4aa8', {spreadX:5, life:20, size:3});
        SFX.enemyDefeat();
      } else {
        triggerDeath();
      }
    }
  }

  for(const c of coins){
    if(c.taken) continue;
    const cb = {x:c.x-10,y:c.y-10,w:20,h:20};
    if(rectsOverlap(player, cb)){
      c.taken=true; coinCount++;
      document.getElementById('coins').textContent=coinCount;
      spawnParticles(c.x, c.y, 10, '#ffd23f', {spreadX:4, life:18, size:2, up:true});
      SFX.coin();
    }
  }

  for(const h of hearts){
    if(h.taken) continue;
    const hb = {x:h.x-12,y:h.y-12,w:24,h:24};
    if(rectsOverlap(player, hb)){
      h.taken=true; player.extraLives = Math.min(3, player.extraLives+1);
      document.getElementById('lives').textContent = player.extraLives;
      spawnParticles(h.x, h.y, 16, '#ff5577', {spreadX:5, life:22, size:3, up:true});
      SFX.heart();
    }
  }

  if(player.invuln>0) player.invuln--;

  updateParticles();
  document.getElementById('dashBar').style.width = (100 - (player.dashCooldown/DASH_COOLDOWN*100)) + '%';
  document.getElementById('rewBar').style.width = (100 - (player.rewindCooldown/REWIND_COOLDOWN*100)) + '%';
  document.getElementById('dist').textContent = Math.floor(player.x/20);
  if(shakeTime>0) shakeTime--;
}

function triggerDeath(){
  if(player.dead || player.invuln>0) return;
  if(player.extraLives > 0){
    // rare heart saves the run: consume a life, revive in place instead of dying
    player.extraLives--;
    document.getElementById('lives').textContent = player.extraLives;
    player.invuln = 100;
    player.vy = JUMP_FORCE*0.9;
    player.isDashing = false;
    shakeTime = 10; shakeMag = 5;
    glitchFlash = 16;
    spawnParticles(player.x+player.w/2, player.y+player.h/2, 26, '#ff5577', {spreadX:7, life:26, size:3, up:true});
    SFX.heart();
    return;
  }
  player.dead = true;
  SFX.death();
  const dist = Math.floor(player.x/20);
  if(dist > bestDistance){
    bestDistance = dist;
    document.getElementById('best').textContent = bestDistance;
    try{ localStorage.setItem('nix_best_distance', String(bestDistance)); }catch(e){ /* ignore */ }
  }
  showMsg("💀 RUN OVER!\nDistance: "+dist+"m &nbsp; | &nbsp; Coins: "+coinCount+"\nClick or press SPACE to retry");
  gameState = 'dead';
}

let glitchFlash = 0;
function showMsg(t){ const m=document.getElementById('msg'); m.innerHTML=t.replace(/\n/g,'<br>'); m.style.display='block'; }
function drawPixelRect(x,y,w,h,color){ ctx.fillStyle=color; ctx.fillRect(Math.round(x-camX), Math.round(y), w, h); }

// ---------- BACKGROUND ART (hand-coded pixel sky) ----------
// pixel cloud made of blocky rects, drawn at whatever pixel scale is passed in
function drawCloud(px, py, scale, alpha){
  ctx.globalAlpha = alpha; ctx.fillStyle = '#ffffff';
  const blocks = [[0,4,4,4],[4,0,8,8],[12,4,4,4],[2,7,14,3]];
  for(const [bx,by,bw,bh] of blocks) ctx.fillRect(Math.round(px+bx*scale), Math.round(py+by*scale), bw*scale, bh*scale);
  ctx.globalAlpha = 0.5*alpha; ctx.fillStyle = '#dff3ff';
  ctx.fillRect(Math.round(px+2*scale), Math.round(py+7*scale), 8*scale, 2*scale);
  ctx.globalAlpha = 1;
}
// 4-point pixel sparkle/twinkle, like the little cross-shaped stars in the sky reference
function drawSparkle(x, y, size, alpha){
  ctx.globalAlpha = alpha;
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(Math.round(x-size/2), Math.round(y-1), size, 2);
  ctx.fillRect(Math.round(x-1), Math.round(y-size/2), 2, size);
  if(size > 3){
    ctx.globalAlpha = alpha*0.6;
    ctx.fillRect(Math.round(x-size/2-2), Math.round(y-0.5), size+4, 1);
    ctx.fillRect(Math.round(x-0.5), Math.round(y-size/2-2), 1, size+4);
  }
  ctx.globalAlpha = 1;
}
function drawBackground(){
  const distMeters = player.x/20;
  const night = getNightFactor(distMeters);

  // sky gradient blends smoothly between the sunny reference sky and a dim moonlit night sky
  const grad = ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,    lerpColor('#0b2f9e','#04061c', night));
  grad.addColorStop(0.35, lerpColor('#1362d6','#0a1440', night));
  grad.addColorStop(0.7,  lerpColor('#2f9fe8','#16264f', night));
  grad.addColorStop(1,    lerpColor('#7fe0f2','#33456e', night));
  ctx.fillStyle = grad; ctx.fillRect(0,0,W,H);

  // sun by day, moon by night - both drift with a touch of camera parallax and crossfade at the boundary
  const celX = W*0.8 - camX*0.015; const celY = H*0.16;
  if(night < 0.98){
    ctx.save(); ctx.globalAlpha = 1-night;
    const glow = ctx.createRadialGradient(celX,celY,0,celX,celY,72);
    glow.addColorStop(0,'rgba(255,224,140,0.55)'); glow.addColorStop(1,'rgba(255,224,140,0)');
    ctx.fillStyle = glow; ctx.beginPath(); ctx.arc(celX,celY,72,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = '#ffe27a'; ctx.beginPath(); ctx.arc(celX,celY,26,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = '#fff6d0'; ctx.beginPath(); ctx.arc(celX,celY,15,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }
  if(night > 0.02){
    ctx.save(); ctx.globalAlpha = night;
    const glow = ctx.createRadialGradient(celX,celY,0,celX,celY,56);
    glow.addColorStop(0,'rgba(210,220,255,0.4)'); glow.addColorStop(1,'rgba(210,220,255,0)');
    ctx.fillStyle = glow; ctx.beginPath(); ctx.arc(celX,celY,56,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = '#e8ecff'; ctx.beginPath(); ctx.arc(celX,celY,20,0,Math.PI*2); ctx.fill();
    ctx.fillStyle = '#a7b6e0'; ctx.beginPath(); ctx.arc(celX+7,celY-3,17,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }

  // twinkling pixel sparkles - dim by day, glow brighter under the moon
  for(let i=0;i<46;i++){
    const wx = (i*167 + Math.floor(i/7)*53) % 2200;
    const sx = ((wx - camX*0.05) % (W+200) + (W+200)) % (W+200) - 100;
    const sy = 20 + ((i*61)%(H*0.75));
    const tw = 0.35 + 0.65*Math.max(0, Math.sin(frame*0.04 + i*2.1));
    const starAlpha = tw * Math.max(0.1, night);
    if(starAlpha < 0.08) continue;
    drawSparkle(sx, sy, 2+((i*13)%3), starAlpha);
  }

  // drifting hand-drawn pixel clouds, each with its own parallax + slow rightward drift
  for(let i=0;i<7;i++){
    const wx = i*420;
    const sx = ((wx - camX*0.08 - frame*0.18) % (W+300) + (W+300)) % (W+300) - 150;
    const sy = 34 + ((i*53)%120);
    drawCloud(sx, sy, 1.4+((i*37)%100)/100, 0.9*(1-night*0.45));
  }
}

function drawGroundTextured(seg, leftGap, rightGap){
  const sx = Math.round(seg.x - camX);
  if(sx+seg.w < -20 || sx > W+20) return;
  const capH = 7; // grass cap thickness before the dirt body starts

  // --- dirt body: base fill + two-tone speckled clumps for depth (matches tileset ref) ---
  ctx.fillStyle = '#6b4226';
  ctx.fillRect(sx, seg.y+capH, seg.w, seg.h-capH);
  const cols = Math.floor(seg.w/8), rows = Math.floor((seg.h-capH)/8);
  for(let r=0;r<rows;r++) for(let c=0;c<cols;c++){
    const hv = hashRand(seg.x*3+r*13+c*7);
    if(hv > 0.84){ ctx.fillStyle = '#4a2c17'; ctx.fillRect(sx+c*8+1, seg.y+capH+r*8+1, 5, 5); }
    else if(hv > 0.66){ ctx.fillStyle = '#82552f'; ctx.fillRect(sx+c*8+2, seg.y+capH+r*8+2, 3, 3); }
    else if(hv < 0.08){ ctx.fillStyle = '#3a2313'; ctx.fillRect(sx+c*8+3, seg.y+capH+r*8+3, 2, 2); }
  }

  // --- jagged grass cap: dark base layer, mid-green body, bright bladed highlights ---
  const bladeCols = Math.max(1, Math.floor(seg.w/6));
  ctx.fillStyle = '#2f6e1f';
  for(let c=0;c<bladeCols;c++){
    const bh = capH + 3 + Math.floor(hashRand(seg.x*5+c*11)*6);
    ctx.fillRect(sx+c*6, seg.y+capH-bh+capH, 6, bh);
  }
  ctx.fillStyle = '#4fa62e';
  for(let c=0;c<bladeCols;c++){
    const bh = 4 + Math.floor(hashRand(seg.x*5+c*11+2)*5);
    ctx.fillRect(sx+c*6, seg.y-bh+capH, 6, bh);
  }
  ctx.fillStyle = '#83d64e';
  for(let c=0;c<bladeCols;c++){
    const bh = 2 + Math.floor(hashRand(seg.x*5+c*11+4)*4);
    ctx.fillRect(sx+c*6+1, seg.y-bh+capH, 3, bh);
  }
  ctx.fillStyle = '#c3ff8a';
  for(let c=0;c<bladeCols;c++){
    if(hashRand(seg.x*7+c*3) > 0.62){
      const bh = 1 + Math.floor(hashRand(seg.x*9+c)*3);
      ctx.fillRect(sx+c*6+2, seg.y-bh+capH-1, 2, bh);
    }
  }

  // --- hanging roots at cliff edges next to a gap, like the floating-island refs ---
  if(leftGap){
    ctx.fillStyle = '#3a2313';
    for(let i=0;i<3;i++){
      const rl = 4+Math.floor(hashRand(seg.x*13+i)*10);
      ctx.fillRect(sx+i*3, seg.y+seg.h, 2, rl);
    }
  }
  if(rightGap){
    ctx.fillStyle = '#3a2313';
    for(let i=0;i<3;i++){
      const rl = 4+Math.floor(hashRand(seg.x*17+i)*10);
      ctx.fillRect(sx+seg.w-2-i*3, seg.y+seg.h, 2, rl);
    }
  }
}

// cactus-spike obstacle: a stubby green cactus body bristling with thorns
function drawObstacle(o){
  const sx = Math.round(o.x - camX);
  if(sx < -40 || sx > W+40) return;
  const bx = sx, bw = o.w, by = o.y, bh = o.h;
  // trunk body, two-tone for a rounded look
  ctx.fillStyle = '#2f7a3a';
  ctx.fillRect(bx+4, by, bw-8, bh);
  ctx.fillStyle = '#4fa652';
  ctx.fillRect(bx+6, by, 5, bh);
  ctx.fillStyle = '#1f5a28';
  ctx.fillRect(bx+bw-8, by, 4, bh);
  // side arms for a classic cactus silhouette
  ctx.fillStyle = '#2f7a3a';
  ctx.fillRect(bx, by+bh*0.35, 8, bh*0.4);
  ctx.fillRect(bx+bw-8, by+bh*0.15, 8, bh*0.4);
  // vertical rib shading lines
  ctx.fillStyle = 'rgba(20,60,20,0.5)';
  for(let rx=bx+4; rx<bx+bw-6; rx+=6) ctx.fillRect(rx, by+2, 1, bh-3);
  // thorns bristling off the trunk + arms - these are what actually reads as "dangerous"
  ctx.fillStyle = '#e8e0c8';
  const thornRows = Math.max(3, Math.floor(bh/8));
  for(let i=0;i<thornRows;i++){
    const ty = by+3+i*7;
    ctx.fillRect(bx+1, ty, 3, 2);
    ctx.fillRect(bx+bw-4, ty+3, 3, 2);
  }
  ctx.fillRect(bx+bw/2-4, by-3, 2, 4);
  ctx.fillRect(bx+bw/2+2, by-3, 2, 4);
}

// ---------- COINS & HEARTS (pickups) ----------
function drawCoinPro(cx, cy){
  // pixel coin with a flip-spin: width oscillates to simulate a spinning coin
  const spin = Math.sin(frame*0.1 + cx*0.03);
  const w = Math.max(3, Math.round(14*Math.abs(spin)+3));
  const h = 14;
  const sx = Math.round(cx - camX - w/2);
  const sy = Math.round(cy - h/2);
  ctx.fillStyle = '#a8720f';
  ctx.fillRect(sx, sy, w, h);
  if(w > 4){
    ctx.fillStyle = '#ffd23f';
    ctx.fillRect(sx+1, sy+2, w-2, h-4);
  }
  if(w > 9){
    ctx.fillStyle = '#fff3b0';
    ctx.fillRect(Math.round(sx+w*0.28), sy+3, Math.max(2,Math.round(w*0.22)), h-8);
    ctx.fillStyle = '#e0972a';
    ctx.fillRect(Math.round(sx+w*0.6), sy+4, Math.max(1,Math.round(w*0.12)), h-9);
  }
}

const HEART_GRID = ['.DD.DD.','DPPPPPD','DPPWPPD','DPPPPPD','.DPPPD.','..DPD..','...D...'];
const HEART_PALETTE = { D:'#a8203a', P:'#ff5577', W:'#ffc0cc' };
function drawHeartPro(cx, cy, bobSeed){
  const bob = Math.sin(frame*0.07 + bobSeed)*4;
  const pulse = 1 + Math.sin(frame*0.12 + bobSeed)*0.08;
  const sx = Math.round(cx - camX), sy = Math.round(cy + bob);
  ctx.save();
  const glow = ctx.createRadialGradient(sx,sy,0,sx,sy,22);
  glow.addColorStop(0,'rgba(255,90,120,0.35)');
  glow.addColorStop(1,'rgba(255,90,120,0)');
  ctx.fillStyle = glow;
  ctx.beginPath(); ctx.arc(sx,sy,22,0,Math.PI*2); ctx.fill();
  ctx.restore();
  const pix = 3*pulse, w = HEART_GRID[0].length, h = HEART_GRID.length;
  const startX = sx-(w*pix)/2, startY = sy-(h*pix)/2;
  for(let row=0; row<h; row++){
    for(let col=0; col<w; col++){
      const ch = HEART_GRID[row][col];
      if(ch==='.'||!HEART_PALETTE[ch]) continue;
      ctx.fillStyle = HEART_PALETTE[ch];
      ctx.fillRect(Math.round(startX+col*pix), Math.round(startY+row*pix), Math.ceil(pix), Math.ceil(pix));
    }
  }
}

function draw(){
  ctx.save();
  if(shakeTime>0) ctx.translate((Math.random()-0.5)*shakeMag, (Math.random()-0.5)*shakeMag);
  drawBackground();

  if(gameState === 'title'){ drawTitleScreen(); ctx.restore(); return; }

  for(let i=0;i<groundSegments.length;i++){
    const seg = groundSegments[i];
    const prev = groundSegments[i-1];
    const next = groundSegments[i+1];
    const leftGap = !prev || (seg.x - (prev.x+prev.w) > 4);
    const rightGap = !next || (next.x - (seg.x+seg.w) > 4);
    drawGroundTextured(seg, leftGap, rightGap);
  }
  for(const o of obstacles) drawObstacle(o);

  for(const c of coins){
    if(c.taken) continue;
    const bob = Math.sin(frame*0.08 + c.x)*3;
    drawCoinPro(c.x, c.y+bob);
  }
  for(const h of hearts){
    if(h.taken) continue;
    drawHeartPro(h.x, h.y, h.bobSeed);
  }

  // contact shadow
  ctx.save();
  const shadowScale = player.onGround ? 1 : Math.max(0.35, 1 - Math.abs(player.vy)/22);
  ctx.globalAlpha = 0.32 * shadowScale;
  ctx.fillStyle = '#000000';
  ctx.beginPath();
  ctx.ellipse(Math.round(player.x+player.w/2-camX), Math.round(groundYUnder(player)), 16*shadowScale, 5*shadowScale, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();

  for(const e of flyingEnemies){
    if(!e.alive) continue;
    ctx.save();
    ctx.translate(Math.round(e.x+e.w/2-camX), Math.round(e.y+e.h));
    drawSpriteGrid(ENEMY_SPRITE, ENEMY_PALETTE, ENEMY_PIX, false);
    ctx.restore();
  }

  drawParticles();

  if(glitchFlash>0){
    glitchFlash--;
    ctx.save(); ctx.globalAlpha = 0.4;
    ctx.translate(Math.round(player.x+player.w/2-camX-4), Math.round(player.y+player.h));
    drawSpriteGrid(FOX_IDLE, PALETTE, PIX, player.facing<0);
    ctx.restore();
  }

  if(player.invuln<=0 || Math.floor(player.invuln/4)%2===0){
    ctx.save();
    ctx.translate(Math.round(player.x+player.w/2-camX), Math.round(player.y+player.h));
    ctx.scale(player.scaleX, player.scaleY);
    const frameGrid = {idle:FOX_IDLE, run1:FOX_RUN1, run2:FOX_RUN2, jump:FOX_JUMP}[player.animFrame];
    drawSpriteGrid(frameGrid, PALETTE, PIX, player.facing<0);
    ctx.restore();
  }

  // ambient darkening: everything dims and cools toward moonlight as night sets in
  const nightNow = getNightFactor(player.x/20);
  if(nightNow > 0){
    ctx.fillStyle = `rgba(6,8,26,${0.5*nightNow})`;
    ctx.fillRect(0,0,W,H);
  }

  const vig = ctx.createRadialGradient(W/2,H/2,H*0.35, W/2,H/2,H*0.85);
  vig.addColorStop(0,'rgba(0,0,0,0)'); vig.addColorStop(1,`rgba(0,0,0,${0.38+0.12*nightNow})`);
  ctx.fillStyle = vig; ctx.fillRect(0,0,W,H);
  ctx.fillStyle = `rgba(255,150,60,${0.045*(1-nightNow)})`; ctx.fillRect(0,0,W,H);
  ctx.fillStyle = `rgba(140,170,255,${0.05*nightNow})`; ctx.fillRect(0,0,W,H);

  ctx.restore();
}

function drawTitleScreen(){
  ctx.textAlign = 'center';
  ctx.fillStyle = '#000000'; ctx.globalAlpha = 0.35; ctx.fillRect(0,0,W,H); ctx.globalAlpha = 1;
  ctx.save();
  ctx.translate(W/2, H*0.3);
  ctx.font = 'bold 54px "Courier New"'; ctx.fillStyle = '#e07a2a';
  ctx.strokeStyle = '#2a1a10'; ctx.lineWidth = 6;
  ctx.strokeText('NIX', 0, 0); ctx.fillText('NIX', 0, 0);
  ctx.font = 'bold 20px "Courier New"'; ctx.fillStyle = '#f5e6c8'; ctx.lineWidth = 4;
  ctx.strokeText('ENDLESS GLITCH RUN', 0, 32); ctx.fillText('ENDLESS GLITCH RUN', 0, 32);
  ctx.restore();

  const bob = Math.sin(frame*0.08)*6;
  ctx.save(); ctx.translate(W/2, H*0.56 + bob);
  drawSpriteGrid(FOX_IDLE, PALETTE, PIX*2.2, false);
  ctx.restore();

  ctx.font = 'bold 20px "Courier New"';
  ctx.fillStyle = (Math.sin(frame*0.1) > 0) ? '#ffffff' : '#ffd23f';
  ctx.fillText('CLICK or press SPACE to start', W/2, H*0.76);
  ctx.font = '14px "Courier New"'; ctx.fillStyle = '#cccccc';
  ctx.fillText('Jump over the cacti - speed rises the further you go!', W/2, H*0.83);
  ctx.textAlign = 'left';
}

function loop(){ update(); draw(); requestAnimationFrame(loop); }
loop();
</script>
